<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список желаний</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-custom mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase tracking-wider" href="#">Wishlist</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="tab-active">Мой список</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="tab-archive">Архив</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-secondary btn-sm" id="btn-logout">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="auth-block" class="row justify-content-center hidden">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 mt-5 auth-card">
                    <h4 class="text-center mb-4 fw-bold" id="auth-title">Вход в систему</h4>
                    <form id="auth-form">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Имя пользователя</label>
                            <input type="text" id="auth-username" class="form-control custom-input" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Пароль</label>
                            <input type="password" id="auth-password" class="form-control custom-input" required>
                        </div>
                        <button type="submit" class="btn btn-custom-primary w-100 py-2 mb-3 custom-btn-radius" id="btn-auth-submit">Войти</button>
                    </form>
                    <div class="text-center">
                        <a href="#" id="toggle-auth-mode" class="text-muted small no-underline">Создать аккаунт</a>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-content" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0" id="page-title">Мои желания</h3>
                <button class="btn btn-custom-primary px-4 py-2 custom-btn-radius" id="btn-open-modal">
                    Добавить желание
                </button>
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-4" id="wishes-container">
                </div>
        </div>
    </div>

    <div class="modal fade" id="wishModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 custom-modal-radius">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="wishModalLabel">Новое желание</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3">
                    <form id="wish-form">
                        <input type="hidden" id="wish-id">
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small">Что ты хочешь? *</label>
                            <input type="text" id="wish-title" class="form-control custom-input" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small">Ссылка на магазин</label>
                            <input type="url" id="wish-link" class="form-control custom-input" placeholder="https://...">
                        </div>
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-muted small">Ориентировочная цена</label>
                                <input type="number" id="wish-price" class="form-control custom-input" value="0" step="0.01">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-muted small">Приоритет</label>
                                <select id="wish-priority" class="form-select custom-input">
                                    <option value="low" selected>Низкий</option>
                                    <option value="medium">Средний</option>
                                    <option value="high">Высокий</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Описание или комментарий</label>
                            <textarea id="wish-desc" class="form-control custom-input" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom-primary w-100 py-2 custom-btn-radius">Сохранить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
